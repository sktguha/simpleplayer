<html>
<span style="background-color: lightgray;">http://100.76.9.53:7500 tailscale etc, no trailing slash</span>
<video id="vd0" style="width:100%"></video>
<video id="vd1" style="width:100%;display:none"></video>
<input type="text" id="url" value="http://100.76.9.53:7500" onchange="localStorage.setItem('url', this.value)"
  style="width:100%" /><button onclick="main()" style="zoom:3;">start</button>
<label>swap timeout (ms): <input type="number" id="swapTimeout" value="1000" style="width:6em"
    onchange="localStorage.setItem('swapTimeout', this.value)"></label>
<textarea id='ln'>function(){}</textarea>
<textarea style="width: 100%; height: 100px;" id='log' placeholder="Logs will come here"></textarea>
<button onclick="document.getElementById('log').style.display = 'block';">show log</button>
<button onclick="document.getElementById('log').style.display = 'none';">hide log</button>
<button onclick="downloadLogs();">download log</button>
<label><input type="checkbox" id="tailLog" checked> tail -f</label>
<script>
  const vids = [document.getElementById("vd0"), document.getElementById("vd1")];
  let activeIdx = 0;
  let currentVideoHandle = null;
  const urlInput = document.getElementById("url");
  urlInput.value = localStorage.getItem("url") || urlInput.value;

  const swapTimeoutInput = document.getElementById("swapTimeout");
  swapTimeoutInput.value = localStorage.getItem("swapTimeout") || swapTimeoutInput.value;

  // 100.76.9.53 or hotspot ip etc
  let BASE_URL = document.getElementById("url").value;
  let MAX_RATE = 1.5, MIN_RATE = 0.5;

  // ---- log ring buffer ----
  const LOG_RING_SIZE = 5000;
  let logRing = [];

  function pad(n, len = 2) { return String(n).padStart(len, "0"); }

  function humanTimestamp(d) {
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ` +
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(), 3)}`;
  }

  function log(...args) {
    const text = args.map(arg => {
      if (typeof arg === "string") return arg;
      try {
        return JSON.stringify(arg);
      } catch {
        try {
          return String(arg);
        } catch {
          return "[Unprintable]";
        }
      }
    }).join(" -- ");

    console.log(...args);

    const now = new Date();
    const epochMicros = Math.round(now.getTime() * 1000); // ms -> us (JS has ms precision only)
    const line = `${humanTimestamp(now)} ${text} [${epochMicros}]`;

    logRing.push(line);
    if (logRing.length > LOG_RING_SIZE) logRing.shift();

    const logEl = document.getElementById("log");
    const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 20;

    logEl.value = logRing.join("\n");

    if (document.getElementById("tailLog").checked && atBottom) {
      logEl.scrollTop = logEl.scrollHeight;
    }
  }

  function downloadLogs() {
    const blob = new Blob([logRing.join("\n")], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `logs_${Date.now()}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function getApi(fn = function () { }) {
    log('getApi called, BASE_URL is : ', BASE_URL);
    const response = await fetch(`${BASE_URL}/state`);
    const data = await response.json();
    fn(data);
    log('getApi done returning data, BASE_URL is : ', BASE_URL);
    return data;
  }

  async function getStatusInfoFn(fn = function () { }) {
    return getApi(fn);
  }

  function findStatusById(segments, id) {
    return segments.find(s => s.id === id)?.status;
  }

  async function getNextValidNumber(currentNumber) {
    const { segments } = await getApi();

    let next = currentNumber + 1;

    while (findStatusById(segments, next) === "dead") next++;

    return findStatusById(segments, next) === "ready" ? next : null;
  }

  async function getLatestNumber() {
    log('getLatestNumber called, curr is : ', currentVideoHandle?.currtlyPlayingVideoNumber);
    const data = await getApi();
    const segments = Array.isArray(data?.segments) ? data.segments : [];

    return segments.length
      ? Math.max(...segments.map(s => Number(s?.id) || -1))
      : -1;
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function playVideo(number) {
    log(`Playing video segment ${number}`, currentVideoHandle);

    const idleIdx = 1 - activeIdx;
    const idle = vids[idleIdx];
    const active = vids[activeIdx];

    idle.src = `${BASE_URL}/segment/segment_${String(number).padStart(6, "0")}.mp4`;
    idle.playbackRate = 1;

    const promiseHandle = new Promise(resolve => {
      idle.onended = () => resolve();
    });

    let swapped = false;
    const doSwap = () => {
      if (swapped) return;
      swapped = true;
      idle.play();
      idle.style.display = "";
      active.style.display = "none";
      active.pause();
      activeIdx = idleIdx;
    };

    idle.oncanplay = doSwap;
    setTimeout(doSwap, Number(swapTimeoutInput.value) || 1000);

    return {
      currtlyPlayingVideoNumber: number,
      promiseHandle,
      video: idle,
      setSpeed(rate) {
        idle.playbackRate = rate;
      }
    };
  }

  ////////////////////
  // MAIN LOOP
  ////////////////////

  async function slowOrSpeedUpVideo() {
    const { segments } = await getApi();

    let next = currentVideoHandle.currtlyPlayingVideoNumber + 1;
    while (findStatusById(segments, next) === "dead") next++;

    const ready = findStatusById(segments, next) === "ready";
    if (ready) {
      log(`Next segment ${next} is ready, speeding up playback`);
      currentVideoHandle.setSpeed(MAX_RATE);
    }
    else {
      log(`Next segment ${next} is not ready, slowing down playback`);
      currentVideoHandle.setSpeed(MIN_RATE);
    }
  }

  async function startSetintervalLoopSlowdown(currentVideoHandle) {
    const staleSafePromiseVideoHandle = currentVideoHandle.promiseHandle;
    const id = setInterval(() => slowOrSpeedUpVideo(currentVideoHandle), 50);
    // can be timing issue if next video its changed to ready before the interval is cleared, 
    // but its not a big deal as small local, fix if needed is inside the 
    // slowOrSpeedUpVideo function to check if the currentVideoHandle 
    // is still the same as the one passed in, after that getApi line.
    return staleSafePromiseVideoHandle.finally(() => clearInterval(id));
  }

  async function main() {
    const frontierLatestVideoNumber = await getLatestNumber();
    log('got frontierLatestVideoNumber as', frontierLatestVideoNumber);
    // this is only one initialisation place, else undefined
    currentVideoHandle = { currtlyPlayingVideoNumber: frontierLatestVideoNumber };

    while (1) {
      const nextValidNumber = await getNextValidNumber(currentVideoHandle.currtlyPlayingVideoNumber);

      if (nextValidNumber === null || nextValidNumber <= currentVideoHandle.currtlyPlayingVideoNumber) {
        log('invalid nextValidNumber, waiting for 100ms and retrying...', nextValidNumber, currentVideoHandle.currtlyPlayingVideoNumber);
        await sleep(100);
        continue;
      }

      currentVideoHandle = playVideo(nextValidNumber);

      startSetintervalLoopSlowdown(currentVideoHandle);

      await currentVideoHandle.promiseHandle;
    }
  }

  log("test log");
  log("test log 2");

</script>

</html>
