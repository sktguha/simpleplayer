<html>
<span style="background-color: lightgray;">http://100.76.9.53:7500 tailscale etc, no trailing slash</span>
<video id="vd0" style="width:100%"></video>
<video id="vd1" style="width:100%;display:none"></video>
<label><input type="checkbox" id="dg">debug level log</label>
<input type="text" id="url" value="http://100.76.9.53:7500" onchange="localStorage.setItem('url', this.value)"
  style="width:100%" /><button onclick="main()" style="zoom:3;">start</button>
<label>swap timeout (ms): <input type="number" id="swapTimeout" value="1000" style="width:6em"
    onchange="localStorage.setItem('swapTimeout', this.value)"></label>
<label>min rate: <input type="text" id="minRate" value="0.4" style="width:4em"
    onchange="localStorage.setItem('minRate', this.value)"></label>
<label>max rate: <input type="text" id="maxRate" value="4" style="width:4em"
    onchange="localStorage.setItem('maxRate', this.value)"></label>
<div id="logI" style="white-space:pre;font-family:monospace;"></div>
<textarea id='ln'>function(){}</textarea>
<textarea style="width: 100%; height: 100px;" id='log' placeholder="Logs will come here"></textarea>
<button onclick="document.getElementById('log').style.display = 'block'; flushLogToDom();">show log</button>
<button onclick="document.getElementById('log').style.display = 'none';">hide log</button>
<button onclick="downloadLogs();">download log</button>
<label><input type="checkbox" id="tailLog" checked> tail -f</label>
<script>
  const vids = [document.getElementById("vd0"), document.getElementById("vd1")];
  let activeIdx = 0;
  let currentVideoHandle = null;
  const urlInput = document.getElementById("url");
  urlInput.value = localStorage.getItem("url") || urlInput.value;

  const swapTimeoutInput = document.getElementById("swapTimeout");
  swapTimeoutInput.value = localStorage.getItem("swapTimeout") || swapTimeoutInput.value;

  const minRateInput = document.getElementById("minRate");
  minRateInput.value = localStorage.getItem("minRate") || minRateInput.value;
  const maxRateInput = document.getElementById("maxRate");
  maxRateInput.value = localStorage.getItem("maxRate") || maxRateInput.value;

  // 100.76.9.53 or hotspot ip etc
  let BASE_URL = document.getElementById("url").value;
  const getMinRate = () => parseFloat(minRateInput.value) || 0.4;
  const getMaxRate = () => parseFloat(maxRateInput.value) || 4;

  // ---- log ring buffer ----
  const LOG_RING_SIZE = 5000;
  let logRing = [];
  let logDirty = false; // true when logRing has changed since last DOM flush

  function pad(n, len = 2) { return String(n).padStart(len, "0"); }

  function humanTimestamp(d) {
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ` +
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(), 3)}`;
  }

  function log(...args) {
    const text = args.map(arg => {
      if (typeof arg === "string") return arg;
      try {
        return JSON.stringify(arg);
      } catch {
        try {
          return String(arg);
        } catch {
          return "[Unprintable]";
        }
      }
    }).join(" -- ");

    console.log(...args);

    const now = new Date();
    const epochMicros = Math.round(now.getTime() * 1000); // ms -> us (JS has ms precision only)
    const line = `${humanTimestamp(now)} ${text} [${epochMicros}]`;

    logRing.push(line);
    if (logRing.length > LOG_RING_SIZE) logRing.shift();
    logDirty = true;

    flushLogToDom();
  }

  // only touches the textarea DOM when it's actually visible, so hidden logs
  // don't cost layout/paint. Called again when "show log" is pressed.
  function flushLogToDom() {
    const logEl = document.getElementById("log");
    if (logEl.style.display === "none" || !logDirty) return;

    const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 20;
    logEl.value = logRing.join("\n");
    logDirty = false;

    if (document.getElementById("tailLog").checked && atBottom) {
      logEl.scrollTop = logEl.scrollHeight;
    }
  }

  function logD(...args) {
    if (document.getElementById("dg").checked) {
      log(...args);
    }
  }

  // logI: last-2-lines "important" status display, always visible, no history kept
  let logILines = [];
  function logI(text) {
    logILines.push(text);
    if (logILines.length > 2) logILines.shift();
    document.getElementById("logI").textContent = logILines.join("\n");
  }

  function downloadLogs() {
    const blob = new Blob([logRing.join("\n")], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `logs_${Date.now()}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function getApi(fn = function () { }) {
    logD('getApi called, BASE_URL is : ', BASE_URL);
    const response = await fetch(`${BASE_URL}/state`);
    const data = await response.json();
    fn(data);
    logD('getApi done returning data, BASE_URL is : ', BASE_URL);
    return data;
  }

  async function getStatusInfoFn(fn = function () { }) {
    return getApi(fn);
  }

  function findStatusById(segments, id) {
    return segments.find(s => s.id === id)?.status;
  }

  // Server now reports 4 real statuses: "ready", "downloading", "pending",
  // "dead". Only "dead" (and truly unknown ids the server has never heard of,
  // which show up as undefined) should be skipped past. "downloading" and
  // "pending" mean the server is actively still trying — wait, don't skip.
  function isSkippable(status) {
    return status === "dead" || status === undefined;
  }

  async function getNextValidNumber(currentNumber) {
    const { segments } = await getApi();

    let next = currentNumber + 1;
    const skipped = [];

    while (isSkippable(findStatusById(segments, next))) {
      skipped.push(next);
      next++;
    }

    if (skipped.length) {
      logD(`Skipped dead/unknown segments: ${skipped.join(", ")}`);
    }

    const status = findStatusById(segments, next);
    if (status === "ready") return next;

    // next exists but isn't ready yet (downloading/pending) — wait on it,
    // don't skip past it.
    if (status === "downloading" || status === "pending") {
      logD(`Waiting on segment ${next} (status: ${status})`);
    }
    return null;
  }

  async function getLatestNumber() {
    log('getLatestNumber called, curr is : ', currentVideoHandle?.currtlyPlayingVideoNumber);
    const data = await getApi();
    const segments = Array.isArray(data?.segments) ? data.segments : [];

    return segments.length
      ? Math.max(...segments.map(s => Number(s?.id) || -1))
      : -1;
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  // Ramp settings for gradual speed changes (owned entirely inside playVideo)
  const RAMP_STEP = 0.05;       // playbackRate change per tick
  const RAMP_INTERVAL_MS = 50;  // how often we nudge the rate

  // carryRate: the rate the *previous* segment was actually running at when it
  // ended. Passed in so the new segment starts there instead of snapping to 1x.
  function playVideo(number, carryRate = 1) {
    log(`Playing video segment ${number}`, currentVideoHandle, 'carryRate=', carryRate);
    logI(`Playing segment ${number}`);

    const idleIdx = 1 - activeIdx;
    const idle = vids[idleIdx];
    const active = vids[activeIdx];

    idle.src = `${BASE_URL}/segment/segment_${String(number).padStart(6, "0")}.mp4`;
    // start at the rate we left off at, not 1x — avoids the hard reset/stutter
    // at every swap. (.src assignment can itself reset playbackRate on some
    // browsers, so we also re-apply it in doSwap right before play().)
    idle.playbackRate = carryRate;

    let swapped = false;
    let targetRate = carryRate;
    let rampTimerId = null;

    const doSwap = () => {
      if (swapped) return;
      swapped = true;
      idle.playbackRate = carryRate; // re-assert in case .src reset it
      idle.play();
      idle.style.display = "";
      active.style.display = "none";
      active.pause();
      activeIdx = idleIdx;
      startRamp();
    };

    idle.oncanplay = doSwap;
    setTimeout(doSwap, Number(swapTimeoutInput.value) || 1000);

    function startRamp() {
      rampTimerId = setInterval(() => {
        const rate = idle.playbackRate;
        if (Math.abs(rate - targetRate) < RAMP_STEP) {
          idle.playbackRate = targetRate;
          return;
        }
        idle.playbackRate = rate < targetRate
          ? rate + RAMP_STEP
          : rate - RAMP_STEP;
      }, RAMP_INTERVAL_MS);
    }

    const promiseHandle = new Promise(resolve => {
      idle.onended = () => {
        clearInterval(rampTimerId);
        // hand off the rate this segment actually ended at, so the next
        // playVideo() call can carry it forward instead of resetting to 1x
        resolve(idle.playbackRate);
      };
    });

    return {
      currtlyPlayingVideoNumber: number,
      promiseHandle,
      video: idle,
      // now just sets a target; playVideo's own ramp loop eases toward it
      setSpeed(rate) {
        targetRate = rate;
      },
      // lets external code read "what rate is this segment on right now"
      // without waiting for onended (used defensively, not required for the fix)
      getCurrentRate() {
        return idle.playbackRate;
      }
    };
  }

  ////////////////////
  // MAIN LOOP
  ////////////////////

  async function slowOrSpeedUpVideo() {
    const { segments } = await getApi();

    let next = currentVideoHandle.currtlyPlayingVideoNumber + 1;
    while (isSkippable(findStatusById(segments, next))) next++;

    const status = findStatusById(segments, next);
    const ready = status === "ready";
    if (ready) {
      logD(`Next segment ${next} is ready, speeding up playback`);
      logI(`Speed target: ${getMaxRate()}x (next ready)`);
      currentVideoHandle.setSpeed(getMaxRate());
    }
    else {
      logD(`Next segment ${next} is not ready (status: ${status}), slowing down playback`);
      logI(`Speed target: ${getMinRate()}x (next: ${status || "unseen"})`);
      currentVideoHandle.setSpeed(getMinRate());
    }
  }

  async function startSetintervalLoopSlowdown(currentVideoHandle) {
    const staleSafePromiseVideoHandle = currentVideoHandle.promiseHandle;
    const id = setInterval(() => slowOrSpeedUpVideo(currentVideoHandle), 300);
    // can be timing issue if next video its changed to ready before the interval is cleared, 
    // but its not a big deal as small local, fix if needed is inside the 
    // slowOrSpeedUpVideo function to check if the currentVideoHandle 
    // is still the same as the one passed in, after that getApi line.
    return staleSafePromiseVideoHandle.finally(() => clearInterval(id));
  }

  async function main() {
    const frontierLatestVideoNumber = await getLatestNumber();
    log('got frontierLatestVideoNumber as', frontierLatestVideoNumber);
    // this is only one initialisation place, else undefined
    currentVideoHandle = { currtlyPlayingVideoNumber: frontierLatestVideoNumber };

    let carryRate = 1; // first segment ever: no prior rate to carry, start at 1x

    while (1) {
      const nextValidNumber = await getNextValidNumber(currentVideoHandle.currtlyPlayingVideoNumber);

      if (nextValidNumber === null || nextValidNumber <= currentVideoHandle.currtlyPlayingVideoNumber) {
        log('invalid nextValidNumber, waiting for 100ms and retrying...', nextValidNumber, currentVideoHandle.currtlyPlayingVideoNumber);
        await sleep(100);
        continue;
      }

      currentVideoHandle = playVideo(nextValidNumber, carryRate);

      startSetintervalLoopSlowdown(currentVideoHandle);

      // promiseHandle now resolves with the rate the segment ended at;
      // that becomes next segment's starting rate
      carryRate = await currentVideoHandle.promiseHandle;
    }
  }

  log("test log");
  log("test log 2");

</script>

</html>
