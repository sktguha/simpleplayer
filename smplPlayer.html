<html>
<span style="background-color: lightgray;">http://100.76.9.53:7500 tailscale etc, no trailing slash</span>
<video id="vd"></video>
<input type="text" id="url" value="http://100.76.9.53:7500" onchange="localStorage.setItem('url', this.value)"
  style="width:100%" /><button onclick="main()" style="zoom:3;">start</button>
<textarea id='ln'>function(){}</textarea>
<textarea style="width: 100%; height: 100px;" id='log' placeholder="Logs will come here"></textarea>
<button onclick="document.getElementById('log').style.display = 'block';">show log</button>
<button onclick="document.getElementById('log').style.display = 'none';">hide log</button>
<script>
  const urlInput = document.getElementById("url");
  urlInput.value = localStorage.getItem("url") || urlInput.value;

  // 100.76.9.53
  let BASE_URL = document.getElementById("url").value;
  let MAX_RATE = 1.5, MIN_RATE = 0.5;
  function log(...args) {
    console.log(...args);
    const log = document.getElementById('log');
    log.value = log.value + '\n' + args.join(' -- ');
  }

  async function getApi(fn = function () { }) {
    const response = await fetch(`${BASE_URL}/state`);
    const data = await response.json();
    fn(data);
    return data;
  }

  async function getStatusInfoFn(fn = function () { }) {
    return getApi(fn);
  }

  async function getLatestNumber() {
    const data = await getApi();
    const segments = Array.isArray(data?.segments) ? data.segments : [];

    return segments.length
      ? Math.max(...segments.map(s => Number(s?.id) || -1))
      : -1;
  }

  async function startSetintervalLoopSlowdown(currentVideo) {
    const latestNumber = await getLatestNumber();
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function playVideo(number) {
    const video = document.getElementById("vd");

    video.src = `${BASE_URL}/segment/segment_${String(number).padStart(6, "0")}.mp4`;
    video.playbackRate = 1;

    const promiseHandle = new Promise(resolve => {
      video.onended = () => resolve();
    });

    video.play();

    return {
      currVideoNumber: number,
      promiseHandle,
      video,
      setSpeed(rate) {
        video.playbackRate = rate;
      }
    };
  }

  ////////////////////
  // MAIN LOOP
  ////////////////////

  let currentVideoHandle = { currVideoNumber: -Infinity };

  async function main() {
    while (1) {
      const number = await getLatestNumber();

      if (number <= currentVideoHandle.currVideoNumber) {
        await sleep(100);
        continue;
      }

      currentVideoHandle = playVideo(number);

      // startSetintervalLoopSlowdown(currentVideoHandle);

      await currentVideoHandle.promiseHandle;
    }
  }

  log("test log");
  log("test log 2");

</script>

</html>
